name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Playwright browser (Storybook + e2e tests)
        run: pnpm --filter @job-tracker/web-next exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Build
        run: pnpm build
